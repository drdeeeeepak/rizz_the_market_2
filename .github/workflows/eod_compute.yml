name: EOD Compute

on:
  schedule:
    # 3:35 PM IST = 10:05 UTC, Mon-Fri
    - cron: "5 10 * * 1-5"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering manually?"
        required: false
        default: "manual run"

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Kite auto-login (generates access_token.txt)
        env:
          KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID:     ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD:    ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
        run: python scripts/kite_auto_login.py

      - name: Run EOD compute (options/signals)
        env:
          KITE_API_KEY:    ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT:   ${{ secrets.TELEGRAM_CHAT }}
        run: python scripts/eod_compute.py

      - name: Build token map if missing
        continue-on-error: true
        env:
          KITE_API_KEY:    ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
        run: |
          [ -f data/nifty500_tokens.json ] && echo "Token map exists, skipping fetch" || \
            python scripts/fetch_nifty500_tokens.py

      - name: Run EOD geo scan + OI snapshot + market health breadth
        continue-on-error: true
        env:
          KITE_API_KEY:    ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
        run: python scripts/run_scan.py --label eod --snapshot --health

      - name: Commit all outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals.json data/breach_levels.json data/rolled_positions.json \
                  data/watchlists/ data/parquet/ data/nifty500_tokens.json \
                  access_token.txt
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: EOD compute + geo scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
