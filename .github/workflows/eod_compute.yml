name: EOD Compute

on:
  schedule:
    # 3:35 PM IST = 10:05 UTC, Mon-Fri
    - cron: "5 10 * * 1-5"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering manually?"
        required: false
        default: "manual run"

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EOD compute
        env:
          KITE_API_KEY:    ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT:   ${{ secrets.TELEGRAM_CHAT }}
        run: python scripts/eod_compute.py

      - name: Commit signals output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals.json data/breach_levels.json data/rolled_positions.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: EOD signals $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
