name: Geo Scan 11:00am IST

on:
  schedule:
    # 11:00 AM IST = 05:30 UTC, Mon-Fri
    - cron: "30 5 * * 1-5"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build token map if missing
        env:
          KITE_API_KEY:    ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
        run: |
          [ -f data/nifty500_tokens.json ] && echo "Token map exists, skipping fetch" || \
            python scripts/fetch_nifty500_tokens.py

      - name: Run 11:00am scan
        env:
          KITE_API_KEY:    ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
        run: python scripts/run_scan.py --label 1100

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/watchlists/ data/nifty500_tokens.json
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: geo scan 1100 $(date -u '+%Y-%m-%d')"
          git push origin main
