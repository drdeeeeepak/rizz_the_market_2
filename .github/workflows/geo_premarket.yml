name: Geo Pre-Market Brief 9:00am IST

on:
  schedule:
    # 9:00 AM IST = 03:30 UTC, Mon-Fri
    - cron: "30 3 * * 1-5"
  workflow_dispatch:

jobs:
  premarket:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pre-market brief
        env:
          KITE_API_KEY:    ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
        run: python scripts/premarket_geo_brief.py

      - name: Commit brief
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/watchlists/
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: pre-market brief $(date -u '+%Y-%m-%d')"
          git push origin main
